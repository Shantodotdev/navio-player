name: 'publish'

on:
  push:
    tags:
      - 'v*' # Triggers on stable version tags (e.g. v1.0.0)

permissions:
  contents: write

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: create draft release if missing
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tagName = context.ref.replace('refs/tags/', '')
            const releaseData = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: `Navio Player ${tagName}`,
              body: 'See the assets below to download and install Navio Player for your operating system.',
              draft: true,
              prerelease: false,
            }

            try {
              await github.rest.repos.getReleaseByTag({
                owner: releaseData.owner,
                repo: releaseData.repo,
                tag: tagName,
              })
              core.info(`Release ${tagName} already exists; reusing it.`)
            } catch (error) {
              if (error.status !== 404) throw error
              await github.rest.repos.createRelease(releaseData)
              core.info(`Created draft release ${tagName}.`)
            }

  publish-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # macOS Silicon (M1/M2/M3)
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # macOS Intel
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04' # Linux
            args: ''
          - platform: 'windows-latest' # Windows
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: install frontend dependencies
        run: npm ci --legacy-peer-deps

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }} # Uses the stable tag pushed (e.g. v0.1.0)
          releaseName: 'Navio Player ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install Navio Player for your operating system.'
          releaseDraft: true
          args: ${{ matrix.args }}

  publish-release:
    needs: publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: publish completed release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tagName = context.ref.replace('refs/tags/', '')
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tagName,
            })

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
              prerelease: false,
            })
            core.info(`Published stable release ${tagName}.`)
