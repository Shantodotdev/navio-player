name: 'publish'

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*' # Triggers on stable version tags (e.g. v1.0.0)

permissions:
  contents: write

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: create draft release if missing
        id: release
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const stableTagPattern = /^v(\d+)\.(\d+)\.(\d+)$/
            let tagName = context.ref.replace('refs/tags/', '')

            if (context.eventName === 'workflow_dispatch') {
              const tags = await github.paginate(github.rest.repos.listTags, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              })
              const stableTags = tags
                .map((tag) => {
                  const match = tag.name.match(stableTagPattern)
                  return match
                    ? { name: tag.name, version: match.slice(1).map(Number) }
                    : null
                })
                .filter(Boolean)
                .sort((left, right) => {
                  for (let index = 0; index < 3; index += 1) {
                    const difference = right.version[index] - left.version[index]
                    if (difference !== 0) return difference
                  }
                  return 0
                })

              if (stableTags.length === 0) {
                core.setFailed('No stable version tag was found.')
                return
              }
              tagName = stableTags[0].name
            }

            if (!stableTagPattern.test(tagName)) {
              core.setFailed(`Release tag ${tagName} is not a stable vMAJOR.MINOR.PATCH tag.`)
              return
            }

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            })
            const releaseData = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: `Navio Player ${tagName}`,
              body: 'See the assets below to download and install Navio Player for your operating system.',
              draft: true,
              prerelease: false,
            }

            let release = releases.find((candidate) => candidate.tag_name === tagName)
            if (release) {
              core.info(`Release ${tagName} already exists; reusing it.`)
            } else {
              const response = await github.rest.repos.createRelease(releaseData)
              release = response.data
              core.info(`Created draft release ${tagName}.`)
            }

            core.setOutput('release_id', release.id)
            core.setOutput('tag_name', tagName)

  publish-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # macOS Silicon (M1/M2/M3)
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # macOS Intel
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04' # Linux
            args: ''
          - platform: 'windows-latest' # Windows
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.create-release.outputs.tag_name }}

      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: install frontend dependencies
        run: npm ci --legacy-peer-deps

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ needs.create-release.outputs.tag_name }}
          releaseName: 'Navio Player ${{ needs.create-release.outputs.tag_name }}'
          releaseBody: 'See the assets below to download and install Navio Player for your operating system.'
          releaseDraft: true
          args: ${{ matrix.args }}

  publish-release:
    needs:
      - create-release
      - publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: publish completed release
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number('${{ needs.create-release.outputs.release_id }}'),
              draft: false,
              prerelease: false,
            })
            core.info(`Published stable release ${{ needs.create-release.outputs.tag_name }}.`)
